<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Craft Biz — Page Not Found</title>
<meta name="robots" content="noindex">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0f0f0f;color:#fff;min-height:100vh;display:flex;
    align-items:center;justify-content:center;text-align:center;padding:2rem;}
  .wrap{max-width:420px;}
  .ico{font-size:4rem;margin-bottom:1.2rem;}
  h1{font-size:1.6rem;font-weight:800;margin-bottom:.5rem;letter-spacing:-.03em;}
  p{font-size:.88rem;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:1.8rem;}
  a{display:inline-block;background:#c8401a;color:#fff;padding:.7rem 1.8rem;
    border-radius:100px;font-size:.82rem;font-weight:600;text-decoration:none;
    transition:background .2s;}
  a:hover{background:#a83214;}
  .brand{font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:rgba(255,255,255,.25);margin-bottom:2rem;}
</style>
<script>
  /* Redirect to home after 3 seconds */
  setTimeout(function(){ window.location.replace('/'); }, 3000);
</script>
</head>
<body>
<div class="wrap">
  <div class="brand">Craft Biz</div>
  <div class="ico">⚡</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has moved.<br>Redirecting you to the homepage…</p>
  <a href="/">Go to Homepage</a>
</div>
</body>
</html>
